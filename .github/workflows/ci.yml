name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            verus-release: verus-x86-linux
          - os: macos-latest
            verus-release: verus-arm64-macos

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Download Verus
        id: verus
        env:
          VERUS_RELEASE: ${{ matrix.verus-release }}
        run: |
          set -euo pipefail
          release_base="https://github.com/verus-lang/verus/releases"
          latest_base="${release_base}/latest/download"
          asset_suffix="${VERUS_RELEASE#verus-}"

          curl_retry() {
            curl -fL --retry 5 --retry-delay 2 --retry-all-errors "$@"
          }

          release_tag="$(
            {
              curl -fsSI --retry 5 --retry-delay 2 --retry-all-errors "${latest_base}/placeholder" \
                | tr -d '\r' \
                | sed -nE 's#^[Ll]ocation: https://github.com/verus-lang/verus/releases/download/(.+)/placeholder$#\1#p' \
                | head -n1
            } || true
          )"

          urls=()
          if [ -n "$release_tag" ]; then
            urls+=("${release_base}/download/${release_tag}/verus-${release_tag##*/}-${asset_suffix}.zip")
          fi
          urls+=("${latest_base}/${VERUS_RELEASE}.zip")
          urls+=("${latest_base}/verus-${asset_suffix}.zip")

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT

          downloaded_url=""
          for url in "${urls[@]}"; do
            echo "Trying Verus URL: $url"
            if curl_retry -o "$tmp_dir/verus.zip" "$url"; then
              downloaded_url="$url"
              break
            fi
          done

          if [ -z "$downloaded_url" ]; then
            echo "::error::Unable to download Verus archive for '${VERUS_RELEASE}'."
            exit 1
          fi

          unzip -q "$tmp_dir/verus.zip" -d "$tmp_dir/unpack"
          set -- "$tmp_dir"/unpack/*
          if [ "$#" -ne 1 ] || [ ! -d "$1" ]; then
            echo "::error::Expected one top-level directory in Verus archive."
            find "$tmp_dir/unpack" -mindepth 1 -maxdepth 1 -print
            exit 1
          fi

          rm -rf verus
          mv "$1" verus

          rust_toolchain=""
          if [ -f verus/version.json ]; then
            rust_toolchain="$(python3 -c 'import json; print(json.load(open("verus/version.json")).get("verus", {}).get("toolchain", ""))' 2>/dev/null || true)"
          fi
          if [ -z "$rust_toolchain" ]; then
            rust_toolchain="$(./verus/verus 2>&1 | grep -oE 'nightly-[0-9]{4}-[0-9]{2}-[0-9]{2}|1\.[0-9]+\.[0-9]+-[a-z0-9_-]+' | head -n1 || true)"
          fi
          if [ -z "$rust_toolchain" ]; then
            echo "::error::Could not detect Verus Rust toolchain."
            exit 1
          fi

          echo "Using Verus URL: $downloaded_url"
          echo "Using Verus Rust toolchain: $rust_toolchain"
          echo "rust_toolchain=$rust_toolchain" >> "$GITHUB_OUTPUT"

      - name: Setup Verus (macOS)
        if: runner.os == 'macOS'
        working-directory: ./verus
        run: bash macos_allow_gatekeeper.sh || true

      - name: Setup Rust (Verus toolchain)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.verus.outputs.rust_toolchain }}

      - name: Add tool paths
        run: |
          echo "${{ github.workspace }}/verus" >> "$GITHUB_PATH"
          echo "${{ github.workspace }}/vest-dsl/target/release" >> "$GITHUB_PATH"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vest/target
            vest-dsl/target
            vest-examples/target
          key: ${{ runner.os }}-${{ matrix.verus-release }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.verus-release }}-cargo-
            ${{ runner.os }}-cargo-

      - name: vest - cargo verus build
        working-directory: ./vest
        run: cargo verus build -- --expand-errors --rlimit 800000

      - name: vest - cargo build --release
        working-directory: ./vest
        run: cargo build --release

      - name: vest-dsl - cargo build --release
        working-directory: ./vest-dsl
        run: cargo build --release

      - name: vest-dsl - regression tests
        working-directory: ./vest-dsl/test
        run: make VEST_DSL=../target/release/vest

      - name: vest-examples - cargo verus verify
        working-directory: ./vest-examples
        run: cargo verus verify --workspace --exclude tls_dsl -- --expand-errors --rlimit 800000

      - name: vest-examples - cargo verus verify tls_dsl
        id: verus_tls_dsl
        continue-on-error: true
        working-directory: ./vest-examples
        run: cargo verus verify --package tls_dsl -- --expand-errors --rlimit 800000

      - name: Warn on tls_dsl failure
        if: always() && steps.verus_tls_dsl.outcome == 'failure'
        run: echo "::warning::tls_dsl verification failed (verification stability issue)"

      - name: Download benchmark data
        run: |
          mkdir -p vest-examples/bitcoin_dsl/benches/data
          curl -fL --retry 5 --retry-delay 2 --retry-all-errors \
            -o vest-examples/bitcoin_dsl/benches/data/sampled_blocks.txt \
            https://github.com/y1ca1/vest/releases/download/v0.1.2/sampled_blocks.txt

      - name: vest-examples/tls_dsl - cargo bench
        working-directory: ./vest-examples/tls_dsl
        run: cargo bench --no-run

      - name: vest-examples/bitcoin_dsl - cargo bench
        working-directory: ./vest-examples/bitcoin_dsl
        run: cargo bench --no-run
