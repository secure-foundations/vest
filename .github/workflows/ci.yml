name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            verus-release: verus-x86-linux
          - os: macos-latest
            verus-release: verus-arm64-macos

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Download Verus
        id: verus
        env:
          VERUS_RELEASE: ${{ matrix.verus-release }}
        run: |
          set -euo pipefail
          url="https://github.com/verus-lang/verus/releases/latest/download/${VERUS_RELEASE}.zip"
          curl -fL --retry 5 --retry-delay 2 --retry-all-errors -o verus.zip "$url"
          unzip -q verus.zip
          if [ ! -d "$VERUS_RELEASE" ]; then
            echo "::error::Expected extracted directory '$VERUS_RELEASE' was not found."
            ls -la
            exit 1
          fi
          mv "$VERUS_RELEASE" verus

          rust_toolchain=""
          if [ -f verus/rust-toolchain.toml ]; then
            rust_toolchain="$(sed -nE 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' verus/rust-toolchain.toml | head -n1)"
          elif [ -f verus/rust-toolchain ]; then
            rust_toolchain="$(tr -d '[:space:]' < verus/rust-toolchain)"
          fi

          if [ -z "$rust_toolchain" ]; then
            rust_toolchain="$(./verus/verus 2>&1 | grep -oE 'nightly-[0-9]{4}-[0-9]{2}-[0-9]{2}|1\.[0-9]+\.[0-9]+-[a-z0-9_-]+' | head -n1 || true)"
          fi

          if [ -z "$rust_toolchain" ]; then
            echo "::error::Could not detect Verus Rust toolchain."
            exit 1
          fi

          echo "Using Verus Rust toolchain: $rust_toolchain"
          echo "rust_toolchain=$rust_toolchain" >> "$GITHUB_OUTPUT"

      - name: Setup Verus (macOS)
        if: runner.os == 'macOS'
        working-directory: ./verus
        run: bash macos_allow_gatekeeper.sh || true

      - name: Setup Rust (Verus toolchain)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.verus.outputs.rust_toolchain }}

      - name: Add tool paths
        run: |
          echo "${{ github.workspace }}/verus" >> "$GITHUB_PATH"
          echo "${{ github.workspace }}/vest-dsl/target/release" >> "$GITHUB_PATH"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vest/target
            vest-dsl/target
            vest-examples/target
          key: ${{ runner.os }}-${{ matrix.verus-release }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.verus-release }}-cargo-
            ${{ runner.os }}-cargo-

      - name: vest - cargo verus build
        working-directory: ./vest
        run: cargo verus build -- --expand-errors

      - name: vest - cargo build --release
        working-directory: ./vest
        run: cargo build --release

      - name: vest-dsl - cargo build --release
        working-directory: ./vest-dsl
        run: cargo build --release

      - name: vest-dsl - regression tests
        working-directory: ./vest-dsl/test
        run: make VEST_DSL=../target/release/vest

      - name: vest-examples - cargo verus verify
        working-directory: ./vest-examples
        run: cargo verus verify --workspace --exclude tls_dsl -- --expand-errors

      - name: vest-examples - cargo verus verify tls_dsl
        id: verus_tls_dsl
        continue-on-error: true
        working-directory: ./vest-examples
        run: cargo verus verify --package tls_dsl -- --expand-errors

      - name: Warn on tls_dsl failure
        if: always() && steps.verus_tls_dsl.outcome == 'failure'
        run: echo "::warning::tls_dsl verification failed (verification stability issue)"

      - name: Download benchmark data
        run: |
          mkdir -p vest-examples/bitcoin_dsl/benches/data
          curl -fL --retry 5 --retry-delay 2 --retry-all-errors \
            -o vest-examples/bitcoin_dsl/benches/data/sampled_blocks.txt \
            https://github.com/y1ca1/vest/releases/download/v0.1.2/sampled_blocks.txt

      - name: vest-examples/tls_dsl - cargo bench
        working-directory: ./vest-examples/tls_dsl
        run: cargo bench --no-run

      - name: vest-examples/bitcoin_dsl - cargo bench
        working-directory: ./vest-examples/bitcoin_dsl
        run: cargo bench --no-run
